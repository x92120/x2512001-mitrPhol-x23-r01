apiVersion: 1
datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://host.docker.internal:8087
    isDefault: true
    jsonData:
      version: Flux
      organization: mitrPholMixing
      defaultBucket: MixingData
    secureJsonData:
      token: secret-token-mitrphol-history
