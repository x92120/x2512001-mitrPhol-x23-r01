<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="4in"
   height="3in"
   viewBox="0 0 384 288"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  
  <!-- Outer Border -->
  <rect x="2" y="2" width="380" height="284" rx="6" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Header: Packing Box From FH or SPP -->
  <rect x="2" y="2" width="380" height="32" fill="black" rx="4" />
  <text x="192" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">PACKING BOX FROM {{Warehouse}}</text>

  <!-- Box ID -->
  <text x="10" y="50" fill="black" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Box ID: {{BoxId}}</text>
  
  <!-- preBatch Packing List Title -->
  <text x="10" y="72" fill="black" font-size="12" font-family="Arial, sans-serif" font-weight="bold" text-decoration="underline">preBatch Packing List</text>
  
  <!-- Loop rows over preBatch-IDs inserted via TS -->
  <g transform="translate(0, 80)">
    {{PreBatchRows}}
  </g>

  <line x1="10" y1="200" x2="374" y2="200" stroke="black" stroke-width="1.5" />

  <!-- Total Volume -->
  <text x="10" y="222" fill="black" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Total Volume: {{TotalNetWeight}} kg</text>
  
  <!-- Boxed StampTime -->
  <text x="10" y="246" fill="black" font-size="10" font-family="Arial, sans-serif">Boxed StampTime: {{PrintDate}}</text>
  <text x="10" y="266" fill="black" font-size="10" font-family="Arial, sans-serif">Plant: {{Plant}}</text>

  <!-- QR-Code on Lower Left Size 3/4 inch (72px) -->
  <g transform="translate(300, 204) scale(1.0)">
    <rect x="-2" y="-2" width="76" height="76" fill="white" stroke="black" stroke-width="1.5" rx="4" />
    {{BoxQRCode}}
  </g>
</svg>
